version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentfinda_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rentfinda_db
    ports:
      - '5432:5432'
    volumes:
      - rentfinda_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: rentfinda_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rentfinda.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  rentfinda_pgdata: